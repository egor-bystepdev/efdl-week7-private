name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ty type check
        run: uv run ty check .

      - name: Install package
        run: uv pip install -e .

      - name: Pytest with coverage
        run: uv run pytest tests/ -v --cov=./src --cov-fail-under=90

  docker:
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t week07-ci .

      - name: Docker smoke test – REST (port 5000)
        id: smoke_rest
        continue-on-error: true
        run: bash scripts/ci/docker_smoke_test.sh week07-ci

      - name: Docker smoke test – Metrics (port 5000)
        id: smoke_metrics
        continue-on-error: true
        run: bash scripts/ci/docker_metrics_smoke_test.sh week07-ci

      - name: Docker smoke test – gRPC (port 50051)
        id: smoke_grpc
        continue-on-error: true
        run: bash scripts/ci/docker_grpc_smoke_test.sh week07-ci
